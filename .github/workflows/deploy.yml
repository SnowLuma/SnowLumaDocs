name: Deploy Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install pnpm BEFORE setup-node so the latter can cache the
      # pnpm store via its built-in `cache: pnpm` option.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          # Fumadocs 16 / Next 16 require Node >= 22.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        # The repo lives standalone in CI (no parent monorepo), so the
        # in-repo `.npmrc` (`ignore-workspace=true`) and `--frozen-lockfile`
        # both apply by default. Pin explicitly anyway for safety.
        run: pnpm install --frozen-lockfile

      - name: Build (Next.js static export)
        run: pnpm build

      - name: Deploy to GitHub Pages
        env:
          PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          # Next.js static export lands in `out/`, not `dist/`.
          cd out
          # Disable Jekyll on GitHub Pages so `_next/` paths are served.
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan main
          git add -A
          git commit -m "Deploy documentation"
          git remote add origin "https://x-access-token:${PAGES_DEPLOY_TOKEN}@github.com/SnowLuma/snowluma.github.io.git"
          git push --force origin main
